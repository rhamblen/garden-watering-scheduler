# Garden Watering Scheduler — Dashboard Card
# v0.2.0
# Repository: https://github.com/rhamblen/garden-watering-scheduler
# Requires: custom:html-template-card (HACS)
#
# HELPERS REQUIRED — create ALL before deploying this card.
# See INSTALLATION.md for step-by-step setup.
#
# Day toggles (create 7):
#   input_boolean.garden_water_mon
#   input_boolean.garden_water_tue
#   input_boolean.garden_water_wed
#   input_boolean.garden_water_thu
#   input_boolean.garden_water_fri
#   input_boolean.garden_water_sat
#   input_boolean.garden_water_sun
#
# Schedule settings:
#   input_select.garden_water_start_time   — 48 options: "00:00" to "23:30"
#   input_number.garden_water_upper_duration  — 5 to 20, step 5, default 15
#   input_number.garden_water_lower_duration  — 5 to 20, step 5, default 10
#
# State flags:
#   input_boolean.garden_schedule_armed
#   input_boolean.garden_winter_shutdown
#   input_boolean.garden_rain_cancel
#   input_number.garden_rain_threshold     — 0 to 100, step 5, default 60 (%)
#
# Timers (create now, used in v0.3.0):
#   timer.garden_upper_lawn
#   timer.garden_lower_lawn
#
# Valve entities:
#   switch.tap_lhs_upper_lawn_blue    — upper zone (runs first)
#   switch.tap_lhs_lower_lawn_green   — lower zone (runs second)

type: custom:html-template-card
ignore_line_breaks: true
content: >-
  {% set armed   = is_state('input_boolean.garden_schedule_armed','on') %}
  {% set winter  = is_state('input_boolean.garden_winter_shutdown','on') %}
  {% set rain    = is_state('input_boolean.garden_rain_cancel','on') %}
  {% set start_t = states('input_select.garden_water_start_time') %}
  {% set upper_d = states('input_number.garden_water_upper_duration')|int(15) %}
  {% set lower_d = states('input_number.garden_water_lower_duration')|int(10) %}
  {% set total_d = upper_d + lower_d %}
  {% set mon = is_state('input_boolean.garden_water_mon','on') %}
  {% set tue = is_state('input_boolean.garden_water_tue','on') %}
  {% set wed = is_state('input_boolean.garden_water_wed','on') %}
  {% set thu = is_state('input_boolean.garden_water_thu','on') %}
  {% set fri = is_state('input_boolean.garden_water_fri','on') %}
  {% set sat = is_state('input_boolean.garden_water_sat','on') %}
  {% set sun = is_state('input_boolean.garden_water_sun','on') %}
  {% set dl = [mon,tue,wed,thu,fri,sat,sun] %}
  {% set any_day = dl|select('equalto',true)|list|length > 0 %}
  {% set today  = now().weekday() %}
  {% set cur_hm = now().strftime('%H:%M') %}
  {% set dnames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] %}
  {% set mnames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] %}
  {% set ns = namespace(off=-1) %}
  {% if dl[today] and cur_hm < start_t %}
    {% set ns.off = 0 %}
  {% else %}
    {% for i in range(1,8) %}{% if ns.off == -1 and dl[(today+i)%7] %}{% set ns.off = i %}{% endif %}{% endfor %}
  {% endif %}
  {% if ns.off >= 0 and any_day %}
    {% set ndt = now() + timedelta(days=ns.off) %}
    {% set next_run = dnames[ndt.weekday()] + ' ' + ndt.day|string + ' ' + mnames[ndt.month-1] + ' — ' + start_t %}
  {% else %}
    {% set next_run = 'No days selected' %}
  {% endif %}
  {% set ns2 = namespace(roff=-1) %}
  {% for i in range(1,8) %}{% if ns2.roff == -1 and dl[(today+i)%7] %}{% set ns2.roff = i %}{% endif %}{% endfor %}
  {% if ns2.roff >= 0 and any_day %}
    {% set rdt = now() + timedelta(days=ns2.roff) %}
    {% set next_after = dnames[rdt.weekday()] + ' ' + rdt.day|string + ' ' + mnames[rdt.month-1] + ' — ' + start_t %}
  {% else %}
    {% set next_after = next_run %}
  {% endif %}
  {% set badge = 'Winterised' if winter else ('Rain skip' if (rain and armed) else ('Armed' if armed else 'Disarmed')) %}
  {% set badge_c = 'gws-bwinter' if winter else ('gws-brain' if (rain and armed) else ('gws-barmed' if armed else 'gws-bdisarm')) %}
  <style>
  .gws{padding:12px;font-family:var(--primary-font-family);color:var(--primary-text-color)}
  .gws-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
  .gws-ttl{font-size:.75em;font-weight:600;color:var(--secondary-text-color);letter-spacing:.07em;text-transform:uppercase}
  .gws-hr{display:flex;align-items:center;gap:6px}
  .gws-rb{width:26px;height:26px;border-radius:6px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .2s}
  .gws-rb-on{background:rgba(33,150,243,.12);border-color:rgba(33,150,243,.4)}
  .gws-badge{font-size:.72em;font-weight:600;padding:2px 8px;border-radius:10px}
  .gws-barmed{background:rgba(29,158,117,.15);color:#0f6e56;border:1px solid rgba(29,158,117,.35)}
  .gws-bdisarm{background:rgba(120,120,120,.1);color:var(--secondary-text-color);border:1px solid rgba(120,120,120,.2)}
  .gws-bwinter{background:rgba(33,150,243,.12);color:#185fa5;border:1px solid rgba(33,150,243,.3)}
  .gws-brain{background:rgba(33,150,243,.12);color:#185fa5;border:1px solid rgba(33,150,243,.3)}
  .gws-sl{font-size:.72em;color:var(--secondary-text-color);margin-bottom:5px;font-weight:600}
  .gws-days{display:flex;gap:4px;margin-bottom:12px}
  .gws-day{flex:1;height:28px;border-radius:6px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);color:var(--secondary-text-color);font-size:.75em;font-weight:600;cursor:pointer;padding:0;transition:all .15s}
  .gws-don{background:rgba(29,158,117,.15);color:#0f6e56;border-color:rgba(29,158,117,.4)}
  .gws-ddim{opacity:.35;pointer-events:none}
  .gws-mid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .gws-ctl{background:rgba(120,120,120,.06);border:1px solid rgba(120,120,120,.1);border-radius:8px;padding:7px 9px}
  .gws-stp{display:flex;align-items:center;justify-content:space-between}
  .gws-sb{width:20px;height:20px;border-radius:4px;border:1px solid rgba(120,120,120,.2);background:var(--card-background-color,#fff);color:var(--primary-text-color);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .gws-sv{font-size:.88em;font-weight:600}
  .gws-drow{margin-bottom:12px}
  .gws-zone{display:flex;align-items:center;margin-bottom:6px;gap:7px}
  .gws-zn{font-size:.72em;color:var(--secondary-text-color);width:62px;flex-shrink:0}
  .gws-dots{display:flex;gap:4px;flex:1}
  .gws-dot{width:17px;height:17px;border-radius:50%;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);cursor:pointer;transition:all .15s;display:inline-block}
  .gws-don2{background:#1d9e75;border-color:#0f6e56}
  .gws-dl{font-size:.7em;color:var(--secondary-text-color);width:28px;text-align:right;flex-shrink:0}
  .gws-acts{display:flex;gap:5px;margin-bottom:10px}
  .gws-bgo{flex:1.2;height:32px;border-radius:7px;border:1px solid #1d9e75;background:rgba(29,158,117,.15);color:#0f6e56;font-size:.8em;font-weight:600;cursor:pointer}
  .gws-bgo-dim{opacity:.35;cursor:default;background:rgba(120,120,120,.08);border-color:rgba(120,120,120,.2);color:var(--secondary-text-color)}
  .gws-bw{flex:1.2;height:32px;border-radius:7px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);color:var(--secondary-text-color);font-size:.8em;cursor:pointer}
  .gws-bw-on{background:rgba(33,150,243,.12);border-color:rgba(33,150,243,.35);color:#185fa5}
  .gws-bdis{flex:1;height:32px;border-radius:7px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);color:var(--secondary-text-color);font-size:.8em;cursor:pointer}
  .gws-div{border:none;border-top:1px solid rgba(120,120,120,.1);margin:8px 0}
  .gws-stat{border-radius:7px;padding:8px 10px;background:rgba(120,120,120,.06)}
  .gws-stl{font-size:.65em;color:var(--secondary-text-color);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .gws-stv{font-size:.85em;font-weight:600}
  .gws-skip{text-decoration:line-through;color:var(--secondary-text-color)}
  .gws-skipn{font-size:.75em;color:#185fa5;margin-top:3px}
  .gws-ntc{border-radius:7px;padding:7px 10px;margin-top:7px;font-size:.75em;line-height:1.4}
  .gws-ntcr{background:rgba(33,150,243,.07);border:1px solid rgba(33,150,243,.2);color:#0c447c}
  .gws-ntcw{background:rgba(33,150,243,.07);border:1px solid rgba(33,150,243,.2);color:#0c447c}
  </style>
  <div class="gws">
  <div class="gws-hdr">
  <span class="gws-ttl">Garden watering</span>
  <div class="gws-hr">
  <button class="gws-rb{{ ' gws-rb-on' if rain else '' }}" onclick="(function(){hass.callService('input_boolean','{{ 'turn_off' if rain else 'turn_on' }}',{entity_id:'input_boolean.garden_rain_cancel'});})()">🌧</button>
  <span class="gws-badge {{ badge_c }}">{{ badge }}</span>
  </div>
  </div>
  <div class="gws-sl">Days</div>
  <div class="gws-days">
  {% set defs=[('M',mon,'input_boolean.garden_water_mon'),('T',tue,'input_boolean.garden_water_tue'),('W',wed,'input_boolean.garden_water_wed'),('T',thu,'input_boolean.garden_water_thu'),('F',fri,'input_boolean.garden_water_fri'),('S',sat,'input_boolean.garden_water_sat'),('S',sun,'input_boolean.garden_water_sun')] %}
  {% for lbl,st,eid in defs %}<button class="gws-day{{ ' gws-don' if st else '' }}{{ ' gws-ddim' if winter else '' }}" onclick="(function(){hass.callService('input_boolean','{{ 'turn_off' if st else 'turn_on' }}',{entity_id:'{{ eid }}'});})()">{{ lbl }}</button>{% endfor %}
  </div>
  <div class="gws-mid">
  <div class="gws-ctl">
  <div class="gws-sl">Start time</div>
  <div class="gws-stp">
  <button class="gws-sb" onclick="(function(){hass.callService('input_select','select_previous',{entity_id:'input_select.garden_water_start_time'});})()">&#8249;</button>
  <span class="gws-sv">{{ start_t }}</span>
  <button class="gws-sb" onclick="(function(){hass.callService('input_select','select_next',{entity_id:'input_select.garden_water_start_time'});})()">&#8250;</button>
  </div>
  </div>
  <div class="gws-ctl">
  <div class="gws-sl">Total run</div>
  <div style="text-align:center;padding-top:2px">
  <span class="gws-sv">{{ total_d }} min</span>
  <div style="font-size:.7em;color:var(--secondary-text-color);margin-top:2px">{{ upper_d }} + {{ lower_d }}</div>
  </div>
  </div>
  </div>
  <div class="gws-sl">Zone duration</div>
  <div class="gws-drow">
  <div class="gws-zone">
  <span class="gws-zn">Upper lawn</span>
  <div class="gws-dots">{% for v in [5,10,15,20] %}<span class="gws-dot{{ ' gws-don2' if v==upper_d else '' }}" onclick="(function(){hass.callService('input_number','set_value',{entity_id:'input_number.garden_water_upper_duration',value:{{ v }}});})()"></span>{% endfor %}</div>
  <span class="gws-dl">{{ upper_d }} min</span>
  </div>
  <div class="gws-zone">
  <span class="gws-zn">Lower lawn</span>
  <div class="gws-dots">{% for v in [5,10,15,20] %}<span class="gws-dot{{ ' gws-don2' if v==lower_d else '' }}" onclick="(function(){hass.callService('input_number','set_value',{entity_id:'input_number.garden_water_lower_duration',value:{{ v }}});})()"></span>{% endfor %}</div>
  <span class="gws-dl">{{ lower_d }} min</span>
  </div>
  </div>
  <div class="gws-acts">
  <button class="gws-bgo{{ ' gws-bgo-dim' if winter else '' }}" onclick="(function(){{% if not winter %}hass.callService('input_boolean','turn_on',{entity_id:'input_boolean.garden_schedule_armed'});hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_rain_cancel'});{% endif %}})()">&#9654; Go</button>
  <button class="gws-bw{{ ' gws-bw-on' if winter else '' }}" onclick="(function(){var svc='{{ 'turn_off' if winter else 'turn_on' }}';hass.callService('input_boolean',svc,{entity_id:'input_boolean.garden_winter_shutdown'});{% if not winter %}hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_schedule_armed'});{% endif %}})()">&#10052; Winterise</button>
  <button class="gws-bdis" onclick="(function(){hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_schedule_armed'});hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_winter_shutdown'});})()">&#9632; Disarm</button>
  </div>
  <hr class="gws-div">
  <div class="gws-stat">
  {% if winter %}
  <div style="color:#185fa5;font-size:.8em">&#10052; All watering suspended. Tap Winterise to re-enable in spring.</div>
  {% elif rain and armed %}
  <div class="gws-stl">Next run</div>
  <div class="gws-stv gws-skip">{{ next_run }}</div>
  <div class="gws-skipn">Skipped &#8212; {{ next_after }}</div>
  {% elif armed and any_day %}
  <div class="gws-stl">Next run</div>
  <div class="gws-stv">{{ next_run }}</div>
  {% elif armed %}
  <div class="gws-stl">Next run</div>
  <div class="gws-stv" style="color:var(--secondary-text-color)">No days selected</div>
  {% else %}
  <div style="color:var(--secondary-text-color);font-size:.8em">Press Go to arm the schedule</div>
  {% endif %}
  </div>
  {% if rain and armed %}
  <div class="gws-ntc gws-ntcr">&#127783; Rain forecast next 24h. Today&#39;s run skipped. Tap &#9654; Go to override.</div>
  {% endif %}
  </div>
