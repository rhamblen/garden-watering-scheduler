        - action: homeassistant.turn_off
          data:
            entity_id: "{{ states('input_text.garden_a_valve_3_entity') }}"
    - if:
        - condition: numeric_state
          entity_id: input_number.garden_a_valve_4_duration
          above: 0
        - condition: template
          value_template: >-
